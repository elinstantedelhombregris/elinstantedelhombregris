name: v2 CI

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'v2/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: v2

permissions:
  contents: read

jobs:
  build-and-test:
    name: lint · type-check · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: v2/.nvmrc
          cache: pnpm
          cache-dependency-path: v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test:unit

      - name: Build all workspaces
        env:
          # Build doesn't actually need a real DB; the api skips DB
          # access at build time. Provide a placeholder so any zod
          # boot-time guards don't trip.
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          JWT_SECRET: ci_jwt_secret_placeholder_at_least_32_chars_xxxxxxxxxxxx
          SESSION_SECRET: ci_session_secret_placeholder_at_least_32_chars_xxxxxxxxxxxx
        run: pnpm build

      - name: Bundle size budgets
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          JWT_SECRET: ci_jwt_secret_placeholder_at_least_32_chars_xxxxxxxxxxxx
          SESSION_SECRET: ci_session_secret_placeholder_at_least_32_chars_xxxxxxxxxxxx
        run: pnpm size

  integration-tests:
    name: integration tests (api ↔ Neon)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Integration tests hit a real Postgres. Until we wire ephemeral
    # Neon branches per CI run (Phase 1), only run on main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: v2/.nvmrc
          cache: pnpm
          cache-dependency-path: v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        env:
          DATABASE_URL: ${{ secrets.V2_DATABASE_URL }}
          DATABASE_URL_UNPOOLED: ${{ secrets.V2_DATABASE_URL_UNPOOLED }}
          JWT_SECRET: ${{ secrets.V2_JWT_SECRET }}
          SESSION_SECRET: ${{ secrets.V2_SESSION_SECRET }}
        run: pnpm test:integration

  e2e-tests:
    name: end-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-test
    # Only on PR + main push. Pull requests verify, main confirms.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: v2/.nvmrc
          cache: pnpm
          cache-dependency-path: v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          JWT_SECRET: ci_jwt_secret_placeholder_at_least_32_chars_xxxxxxxxxxxx
          SESSION_SECRET: ci_session_secret_placeholder_at_least_32_chars_xxxxxxxxxxxx
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: v2/playwright-report/
          retention-days: 7
