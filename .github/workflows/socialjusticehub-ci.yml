name: SocialJusticeHub CI

on:
  push:
    paths:
      - "SocialJusticeHub/**"
      - ".github/workflows/socialjusticehub-ci.yml"
  pull_request:
    paths:
      - "SocialJusticeHub/**"
      - ".github/workflows/socialjusticehub-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SocialJusticeHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: SocialJusticeHub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Route duplication guard
        run: npm run check:routes

      - name: Production build
        run: npm run build
