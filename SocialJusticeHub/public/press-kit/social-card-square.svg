<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <rect width="1080" height="1080" fill="#0a0a0a"/>
  <!-- Gradient orbs -->
  <circle cx="150" cy="900" r="350" fill="#3b82f6" opacity="0.08"/>
  <circle cx="900" cy="150" r="300" fill="#8b5cf6" opacity="0.06"/>
  <!-- Logo mark centered -->
  <rect x="440" y="280" width="200" height="200" rx="40" fill="url(#ss1)"/>
  <text x="540" y="400" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="80" fill="white">HG</text>
  <!-- Text -->
  <text x="540" y="560" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="52" fill="white">El Instante del</text>
  <text x="540" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="30" fill="#3b82f6" letter-spacing="8">HOMBRE GRIS</text>
  <line x1="240" y1="660" x2="840" y2="660" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="540" y="710" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#94a3b8">Plataforma de inteligencia colectiva</text>
  <text x="540" y="745" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#94a3b8">para rediseñar Argentina.</text>
  <!-- Bottom -->
  <text x="540" y="950" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569" letter-spacing="3">CONSCIENCIA · TRANSFORMACIÓN · ACCIÓN</text>
  <defs>
    <linearGradient id="ss1" x1="440" y1="280" x2="640" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
