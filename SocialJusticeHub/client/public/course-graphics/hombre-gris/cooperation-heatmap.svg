<svg width="840" height="420" viewBox="0 0 840 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>Heatmap de cooperación territorial</title>
  <desc>Muestra el nivel de cooperación entre Estado, ciudadanía, empresas y territorio en diferentes escenarios piloto.</desc>
  <defs>
    <linearGradient id="heat" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
  </defs>
  <rect width="840" height="420" rx="28" fill="#0f172a" />
  <text x="60" y="60" fill="#e2e8f0" font-size="20" font-weight="bold">Cooperación acumulada por piloto</text>
  <text x="60" y="85" fill="#94a3b8" font-size="13">Escala 0-100 puntos de reputación compartida</text>
  <g transform="translate(60,110)">
    <text x="0" y="20" fill="#94a3b8" font-size="12">Piloto</text>
    <text x="160" y="20" fill="#94a3b8" font-size="12">Estado</text>
    <text x="290" y="20" fill="#94a3b8" font-size="12">Ciudadanía</text>
    <text x="440" y="20" fill="#94a3b8" font-size="12">Empresas</text>
    <text x="600" y="20" fill="#94a3b8" font-size="12">Territorio</text>
    <g font-size="13" font-weight="600" fill="#e5e7eb">
      <text x="0" y="70">Bahía Confianza</text>
      <text x="0" y="140">Mendoza Datos Abiertos</text>
      <text x="0" y="210">Chaco Microacuerdos</text>
    </g>
    <g>
      <rect x="150" y="40" width="100" height="30" rx="8" fill="#fb7185" />
      <text x="190" y="60" text-anchor="middle" fill="#0f172a" font-weight="700">42</text>
      <rect x="150" y="110" width="120" height="30" rx="8" fill="#fbbf24" />
      <text x="210" y="130" text-anchor="middle" fill="#0f172a" font-weight="700">58</text>
      <rect x="150" y="180" width="150" height="30" rx="8" fill="#34d399" />
      <text x="225" y="200" text-anchor="middle" fill="#0f172a" font-weight="700">73</text>
    </g>
    <g>
      <rect x="280" y="40" width="90" height="30" rx="8" fill="#fbbf24" />
      <text x="325" y="60" text-anchor="middle" fill="#0f172a" font-weight="700">55</text>
      <rect x="280" y="110" width="140" height="30" rx="8" fill="#34d399" />
      <text x="350" y="130" text-anchor="middle" fill="#0f172a" font-weight="700">78</text>
      <rect x="280" y="180" width="120" height="30" rx="8" fill="#34d399" />
      <text x="340" y="200" text-anchor="middle" fill="#0f172a" font-weight="700">66</text>
    </g>
    <g>
      <rect x="430" y="40" width="70" height="30" rx="8" fill="#f87171" />
      <text x="465" y="60" text-anchor="middle" fill="#0f172a" font-weight="700">38</text>
      <rect x="430" y="110" width="120" height="30" rx="8" fill="#fbbf24" />
      <text x="490" y="130" text-anchor="middle" fill="#0f172a" font-weight="700">60</text>
      <rect x="430" y="180" width="150" height="30" rx="8" fill="#34d399" />
      <text x="505" y="200" text-anchor="middle" fill="#0f172a" font-weight="700">75</text>
    </g>
    <g>
      <rect x="590" y="40" width="80" height="30" rx="8" fill="#f97316" />
      <text x="630" y="60" text-anchor="middle" fill="#0f172a" font-weight="700">45</text>
      <rect x="590" y="110" width="110" height="30" rx="8" fill="#34d399" />
      <text x="645" y="130" text-anchor="middle" fill="#0f172a" font-weight="700">72</text>
      <rect x="590" y="180" width="140" height="30" rx="8" fill="#34d399" />
      <text x="660" y="200" text-anchor="middle" fill="#0f172a" font-weight="700">81</text>
    </g>
  </g>
  <rect x="60" y="330" width="720" height="60" rx="16" fill="#020617" opacity="0.65" />
  <text x="80" y="363" fill="#bbf7d0" font-size="14" font-weight="bold">Interpretación Hombre Gris</text>
  <text x="80" y="385" fill="#a5b4fc" font-size="13">El calor verde indica que la cooperación sostenida crece cuando se sostienen microacuerdos con métricas públicas y castigos proporcionales.</text>
</svg>
