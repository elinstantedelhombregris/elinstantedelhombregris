<svg width="760" height="420" viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>Circuito operativo de Tit for Tat aplicado a territorios</title>
  <desc>Diagrama circular que muestra las cuatro fases de la táctica Tit for Tat y los puntos de intervención institucional.</desc>
  <defs>
    <linearGradient id="loop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>
  <rect width="760" height="420" rx="24" fill="#f8fafc" />
  <circle cx="380" cy="210" r="140" stroke="url(#loop)" stroke-width="8" fill="none" />
  <g font-family="'Inter', sans-serif" font-weight="600" font-size="15" fill="#0f172a">
    <text x="360" y="70">1. Coop inicial</text>
    <text x="473" y="160">2. Replicar jugada</text>
    <text x="360" y="345">3. Castigo proporcional</text>
    <text x="180" y="200">4. Perdón condicionado</text>
  </g>
  <g fill="#1f2937" font-size="13">
    <text x="260" y="110">Gesto público</text>
    <text x="260" y="130">(ej. liberar datos)</text>
    <text x="520" y="210">Memoria institucional</text>
    <text x="520" y="230">(dashboards, actas)</text>
    <text x="300" y="320">Respuesta clara y corta</text>
    <text x="160" y="250">Reincorporar tras reparación</text>
  </g>
  <polygon points="380,55 398,90 362,90" fill="#0ea5e9" />
  <polygon points="545,210 510,228 510,192" fill="#0ea5e9" />
  <polygon points="380,365 362,330 398,330" fill="#0ea5e9" />
  <polygon points="215,210 250,192 250,228" fill="#0ea5e9" />
  <rect x="540" y="40" width="180" height="120" rx="16" fill="#eef2ff" stroke="#c7d2fe" />
  <text x="552" y="62" fill="#312e81" font-size="13" font-weight="bold">Palancas Hombre Gris</text>
  <text x="552" y="86" fill="#4338ca" font-size="12">• Sistema de reputación</text>
  <text x="552" y="106" fill="#4338ca" font-size="12">• Auditoría ciudadana</text>
  <text x="552" y="126" fill="#4338ca" font-size="12">• Protocolos de perdón</text>
</svg>
